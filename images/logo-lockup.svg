<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" width="560" height="360"
     style="color:#818059" role="img" aria-label="Fuel with Jess logo">
  <!-- Color follows `color` of the surrounding element (currentColor).
       Default is sage #818059; set color:#ECE5D9 on a dark section to flip it cream. -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Allura&amp;family=Montserrat:wght@600&amp;display=swap');
      .script { font-family:'Allura', cursive; }
      .label  { font-family:'Montserrat', sans-serif; font-weight:600; letter-spacing:0.22em; }
    </style>
  </defs>

  <!-- flame mark -->
  <g transform="translate(330,40) scale(0.9)" fill="currentColor">
    <path d="M34.6 2.2c-1.1 7.4-6.3 11.6-10.9 16-5.4 5.2-10.2 11.3-10.2 20.4 0 13.9 9.3 23.2 21.1 23.2S55.7 52.5 55.7 38.6c0-6.7-2.6-11.6-6-16-1 3.6-3.1 6.2-5.8 7.6 1.4-5.9 1-12.6-2.6-18.2-1.9-3-4.4-6.2-6.7-9.8z"/>
  </g>

  <text class="script" x="280" y="220" font-size="200" text-anchor="middle" fill="currentColor">Fuel</text>

  <line x1="170" y1="285" x2="215" y2="285" stroke="currentColor" stroke-width="2"/>
  <text class="label" x="280" y="293" font-size="26" text-anchor="middle" fill="currentColor">WITH JESS</text>
  <line x1="345" y1="285" x2="390" y2="285" stroke="currentColor" stroke-width="2"/>
</svg>
